<script>
var HE64 = [
[1,"乾为天","乾","䷀","乾","乾","乾：元亨利贞。","天行健，君子以自强不息。",["初九：潜龙勿用。","九二：见龙在田，利见大人。","九三：君子终日乾乾，夕惕若厉，无咎。","九四：或跃在渊，无咎。","九五：飞龙在天，利见大人。","上九：亢龙有悔。"],"纯阳刚健之象。乾为天为君为父，六爻皆阳。君子效法天道自强不息。","运势极强，宜积极进取。初九潜藏待时，九二见机行事，九三勤勉不懈，九四慎进无咎，九五得位乘时，上九盈满则亏，不可过刚。"],
[2,"坤为地","坤","䷁","坤","坤","坤：元亨，利牝马之贞。君子有攸往，先迷后得主。","地势坤，君子以厚德载物。",["初六：履霜，坚冰至。","六二：直方大，不习无不利。","六三：含章可贞，或从王事，无成有终。","六四：括囊，无咎无誉。","六五：黄裳，元吉。","上六：龙战于野，其血玄黄。"],"纯阴至顺之象。坤为地为母，六爻皆阴。厚德载物以柔克刚。","宜柔顺守成，不宜强出头。初六见微知著，六二直方自然，六三含藏待时，六四谨言慎行，六五谦下得吉，上六阴极则争。厚德载物。"],
[3,"水雷屯","屯","䷂","坎","震","屯：元亨利贞。勿用有攸往，利建侯。","云雷，屯。君子以经纶。",["初九：磐桓，利居贞，利建侯。","六二：屯如邅如，乘马班如。匪寇婚媾，女子贞不字，十年乃字。","六三：即鹿无虞，惟入于林中，君子几不如舍，往吝。","六四：乘马班如，求婚媾往吉无不利。","九五：屯其膏，小贞吉大贞凶。","上六：乘马班如，泣血涟如。"],"屯卦象征初生艰难。上坎水为险下震雷为动，动乎险中。屯者盈也万物初生。","初创阶段宜坚守正道等待时机。利建侯立基勿急于远行。初九隐忍待时，六二守贞，六三知止，六四可进，九五宜小不宜大。"],
[4,"山水蒙","蒙","䷃","艮","坎","蒙：亨。匪我求童蒙，童蒙求我。初筮告再三渎则不告。利贞。","山下出泉，蒙。君子以果行育德。",["初六：发蒙，利用刑人，用说桎梏以往吝。","九二：包蒙吉纳妇吉子克家。","六三：勿用取女见金夫不有躬无攸利。","六四：困蒙吝。","六五：童蒙吉。","上九：击蒙不利为寇利御寇。"],"蒙卦象征蒙昧初启教育启蒙。上艮山为阻下坎水为险。蒙者昧也。","宜虚心求学接受教诲。匪我求童蒙童蒙求我，宜主动求教。学习之事亨通。初六发蒙宜严，九二包蒙，六三勿贪利，六五虚心则吉。"],
[5,"水天需","需","䷄","坎","乾","需：有孚光亨贞吉。利涉大川。","云上于天，需。君子以饮食宴乐。",["初九：需于郊利用恒无咎。","九二：需于沙小有言终吉。","九三：需于泥致寇至。","六四：需于血出自穴。","九五：需于酒食贞吉。","上六：入于穴有不速之客三人来敬之终吉。"],"需卦象征等待需求。上坎水为险在前下乾天为健，刚健不陷故需待。","宜等待时机不可急躁。初九保持距离，九二小口舌终吉，九三险境已近，六四顺应避让，九五安享待时，上六敬慎终吉。"],
[6,"天水讼","讼","䷅","乾","坎","讼：有孚窒惕中吉终凶。利见大人不利涉大川。","天与水违行，讼。君子以作事谋始。",["初六：不永所事小有言终吉。","九二：不克讼归而逋其邑人三百户无眚。","六三：食旧德贞厉终吉。或从王事无成。","九四：不克讼复即命渝安贞吉。","九五：讼元吉。","上九：或锡之鞶带终朝三褫之。"],"讼卦象征争讼诉讼。上乾天为刚健下坎水为险陷，天水相违而行。","宜和解避让不宜诉讼。初六稍争即止则吉，九二不讼免灾，六三安守旧德，九四退让则吉，九五公正则吉，上九争讼到底则凶。作事谋始。"],
[7,"地水师","师","䷆","坤","坎","师：贞丈人吉无咎。","地中有水，师。君子以容民畜众。",["初六：师出以律否臧凶。","九二：在师中吉无咎王三锡命。","六三：师或舆尸凶。","六四：师左次无咎。","六五：田有禽利执言无咎。长子帅师弟子舆尸贞凶。","上六：大君有命开国承家小人勿用。"],"师卦象征军队战争团队。上坤地为顺下坎水为险，地中有水藏兵于民。","宜团结众人遵纪守法。宜领导团队协作。师出以律失律凶。初六严明纪律，九二主帅得中，六三贪功冒进凶，六四退守无咎。"],
[8,"水地比","比","䷇","坎","坤","比：吉。原筮元永贞无咎。不宁方来后夫凶。","地上有水，比。先王以建万国亲诸侯。",["初六：有孚比之无咎。有孚盈缶终来有它吉。","六二：比之自内贞吉。","六三：比之匪人。","六四：外比之贞吉。","九五：显比王用三驱失前禽。邑人不诫吉。","上六：比之无首凶。"],"比卦象征亲比团结和谐。上坎水为险下坤地为顺，水流地上亲和渗透。","宜与人亲近合作。初六诚信亲比吉，六二出自内心吉，六三亲比不当伤，九五公正无私，上六无首凶。"],
[9,"风天小畜","小畜","䷈","巽","乾","小畜：亨。密云不雨自我西郊。","风行天上，小畜。君子以懿文德。",["初九：复自道何其咎吉。","九二：牵复吉。","九三：舆说辐夫妻反目。","六四：有孚血去惕出无咎。","九五：有孚挛如富以其邻。","上九：既雨既处尚德载。妇贞厉月几望君子征凶。"],"小畜卦象征小有积蓄以小养大。上巽风为入下乾天为健，风行天上尚未及物。","宜积蓄力量修德养才。密云不雨蓄势待发。初九回归正道，九二携手共进，九三冲突生变，六四诚信免祸，九五共享富贵。"],
[10,"天泽履","履","䷉","乾","兑","履：履虎尾不咥人亨。","上天下泽，履。君子以辨上下定民志。",["初九：素履往无咎。","九二：履道坦坦幽人贞吉。","六三：眇能视跛能履履虎尾咥人凶。武人为于大君。","九四：履虎尾愬愬终吉。","九五：夬履贞厉。","上九：视履考祥其旋元吉。"],"履卦象征履行实践礼仪。上乾天为健下兑泽为悦，尊卑有别礼行天下。","宜谨慎行事循礼而行。如履虎尾慎之又慎终得吉祥。初九质朴而行，九二坦荡幽静，六三不自量力则凶，九四恐惧谨慎终吉。"],
[11,"地天泰","泰","䷊","坤","乾","泰：小往大来吉亨。","天地交，泰。后以财成天地之道。",["初九：拔茅茹以其汇征吉。","九二：包荒用冯河不遐遗朋亡得尚于中行。","九三：无平不陂无往不复。艰贞无咎勿恤其孚于食有福。","六四：翩翩不富以其邻不戒以孚。","六五：帝乙归妹以祉元吉。","上六：城复于隍勿用师。自邑告命贞吝。"],"泰卦象征通泰和合太平。上坤地为顺下乾天为健，天气上升地气下降阴阳交泰。","万事亨通国泰民安。初九志同道合，九二包容大度，九三居安思危，六四谦虚不骄，六五和气致祥，上六盛极将衰。泰极否来。"],
[12,"天地否","否","䷋","乾","坤","否之匪人，不利君子贞，大往小来。","天地不交，否。君子以俭德辟难不可荣以禄。",["初六：拔茅茹以其汇贞吉亨。","六二：包承小人吉大人否亨。","六三：包羞。","九四：有命无咎畴离祉。","九五：休否大人吉。其亡其亡系于苞桑。","上九：倾否先否后喜。"],"否卦象征闭塞不通困厄。上乾天为健下坤地为顺，天地不交阴阳不交。","时运不济宜收敛隐忍等待转机。初六守正待时，六二包容顺受，六三忍辱含羞，九四奉命行事，九五戒惧得吉，上九否极泰来。"],
[13,"天火同人","同人","䷌","乾","离","同人于野亨。利涉大川利君子贞。","天与火，同人。君子以类族辨物。",["初九：同人于门无咎。","六二：同人于宗吝。","九三：伏戎于莽升其高陵三岁不兴。","九四：乘其墉弗克攻吉。","九五：同人先号咷而后笑大师克相遇。","上九：同人于郊无悔。"],"同人卦象征与人和同团结合作。上乾天为健下离火为明，火光上升与天同明。","宜与人合作求同存异。初九开门见山，六二小团体吝，九三争战无功，九四知难而退吉，九五先苦后甜，上九志同道合。"],
[14,"火天大有","大有","䷍","离","乾","大有：元亨。","火在天上，大有。君子以遏恶扬善顺天休命。",["初九：无交害匪咎艰则无咎。","九二：大车以载有攸往无咎。","九三：公用亨于天子小人弗克。","九四：匪其彭无咎。","六五：厥孚交如威如吉。","上九：自天祐之吉无不利。"],"大有卦象征大有收获丰盛。上离火为明下乾天为健，火在天上普照万物。","运势昌隆事业兴旺。初九不骄不躁，九二满载而行，九三公心待人，九四谦虚不傲，六五诚信威严，上九顺天则吉。"],
[15,"地山谦","谦","䷎","坤","艮","谦：亨。君子有终。","地中有山，谦。君子以裒多益寡称物平施。",["初六：谦谦君子用涉大川吉。","六二：鸣谦贞吉。","九三：劳谦君子有终吉。","六四：无不利撝谦。","六五：不富以其邻利用侵伐无不利。","上六：鸣谦利用行师征邑国。"],"谦卦象征谦虚谦逊。上坤地为顺下艮山为止，山本高大而屈居地下。","谦则吉满则损。初六谦之又谦，六二名声在外而谦，九三劳苦功高而谦，六四发挥谦德，六五以谦服众，上六谦而威严。"],
[16,"雷地豫","豫","䷏","震","坤","豫：利建侯行师。","雷出地奋，豫。先王以作乐崇德。",["初六：鸣豫凶。","六二：介于石不终日贞吉。","六三：盱豫悔迟有悔。","九四：由豫大有得。勿疑朋盍簪。","六五：贞疾恒不死。","上六：冥豫成有渝无咎。"],"豫卦象征愉悦豫备。上震雷为动下坤地为顺，雷出地奋万物欢悦。","宜快乐进取但不可过度享乐。初六沉溺享乐凶，六二守中则吉，六三犹豫不决悔，九四诚信聚友，六五带病生存，上六及时改过。"],
[17,"泽雷随","随","䷐","兑","震","随：元亨利贞无咎。","泽中有雷，随。君子以向晦入宴息。",["初九：官有渝贞吉。出门交有功。","六二：系小子失丈夫。","六三：系丈夫失小子。随有求得利居贞。","九四：随有获贞凶。有孚在道以明何咎。","九五：孚于嘉吉。","上六：拘系之乃从维之。王用亨于西山。"],"随卦象征随顺随时。上兑泽为悦下震雷为动，雷动于泽中随时而动。","宜随顺时势灵活应变。初九随机应变，六二从小失大，六三大有收获，九四功高震主，九五信善则吉，上六穷极而变。"],
[18,"山风蛊","蛊","䷑","艮","巽","蛊：元亨。利涉大川。先甲三日后甲三日。","山下有风，蛊。君子以振民育德。",["初六：干父之蛊有子考无咎厉终吉。","九二：干母之蛊不可贞。","九三：干父之蛊小有悔无大咎。","六四：裕父之蛊往见吝。","六五：干父之蛊用誉。","上九：不事王侯高尚其事。"],"蛊卦象征整治弊病拨乱反正。上艮山为止下巽风为入，风入山中草木腐朽。","宜整顿治理革除弊端。初六继承父业，九二灵活处之，九三小有失误无碍，六四姑息养奸吝，六五以德治蛊，上九超然物外。"],
[19,"地泽临","临","䷒","坤","兑","临：元亨利贞。至于八月有凶。","泽上有地，临。君子以教思无穷容保民无疆。",["初九：咸临贞吉。","九二：咸临吉无不利。","六三：甘临无攸利。既忧之无咎。","六四：至临无咎。","六五：知临大君之宜吉。","上六：敦临吉无咎。"],"临卦象征莅临面临。上坤地为顺下兑泽为悦，泽上有地居高临下。","宜亲临其境躬身实践。初九以感化人，九二以善化人，六三巧言令色无用，六四亲临其事，六五智慧临众，上六敦厚待人。"],
[20,"风地观","观","䷓","巽","坤","观：盥而不荐有孚颙若。","风行地上，观。先王以省方观民设教。",["初六：童观小人无咎君子吝。","六二：窥观利女贞。","六三：观我生进退。","六四：观国之光利用宾于王。","九五：观我生君子无咎。","上九：观其生君子无咎。"],"观卦象征观察观望。上巽风为入下坤地为顺，风行地上无所不至。","宜静观其变审时度势。初六见识浅陋，六二片面观察，六三自省进退，六四观国之风，九五自我反省，上九观察他人。"],
[21,"火雷噬嗑","噬嗑","䷔","离","震","噬嗑：亨。利用狱。","雷电，噬嗑。先王以明罚敕法。",["初九：屦校灭趾无咎。","六二：噬肤灭鼻无咎。","六三：噬腊肉遇毒小吝无咎。","九四：噬干胏得金矢利艰贞吉。","六五：噬干肉得黄金贞厉无咎。","上九：何校灭耳凶。"],"噬嗑卦象征咬合刑罚除障。上离火为明下震雷为动，雷电交加啮合物障。","宜清除障碍明断是非。初六小惩大诫，六二果断处理，六三遇小毒无害，九四艰贞得吉，六五中正断案，上九重刑凶。"],
[22,"山火贲","贲","䷕","艮","离","贲：亨。小利有攸往。","山下有火，贲。君子以明庶政无敢折狱。",["初九：贲其趾舍车而徒。","六二：贲其须。","九三：贲如濡如永贞吉。","六四：贲如皤如白马翰如。匪寇婚媾。","六五：贲于丘园束帛戋戋吝终吉。","上九：白贲无咎。"],"贲卦象征装饰文饰。上艮山为止下离火为明，山下有火照亮万物。","宜注重外表与内在和谐。初九朴实无华，六二顺其自然，九三文质彬彬，六四疑而待之，六五俭朴归真，上九返璞归真。"],
[23,"山地剥","剥","䷖","艮","坤","剥：不利有攸往。","山附于地，剥。上以厚下安宅。",["初六：剥床以足蔑贞凶。","六二：剥床以辨蔑贞凶。","六三：剥之无咎。","六四：剥床以肤凶。","六五：贯鱼以宫人宠无不利。","上九：硕果不食。君子得舆小人剥庐。"],"剥卦象征剥落侵蚀衰败。上艮山为止下坤地为顺，山附于地日久剥落。","宜守不宜攻安守待时。初六小人始起，六二渐盛，六三随势而行，六四灾祸临近，六五顺势而为，上九硕果仅存。不利有攸往。"],
[24,"地雷复","复","䷗","坤","震","复：亨。出入无疾朋来无咎。反复其道七日来复利有攸往。","雷在地中，复。先王以至日闭关。",["初九：不远复无祗悔元吉。","六二：休复吉。","六三：频复厉无咎。","六四：中行独复。","六五：敦复无悔。","上六：迷复凶有灾眚。用行师终有大败。"],"复卦象征回复复归循环。上坤地为顺下震雷为动，雷在地中静极复动。一阳来复。","运势转好冬去春来。初九迷途未远即返，六二休养生息，六三屡改屡正，六四中道独复，六五厚德自省，上六迷而不复凶。七日来复。"],
[25,"天雷无妄","无妄","䷘","乾","震","无妄：元亨利贞。其匪正有眚不利有攸往。","天下雷行，物与无妄。先王以茂对时育万物。",["初九：无妄往吉。","六二：不耕获不菑畬则利有攸往。","六三：无妄之灾或系之牛行人之得邑人之灾。","九四：可贞无咎。","九五：无妄之疾勿药有喜。","上九：无妄行有眚无攸利。"],"无妄卦象征不妄为真诚自然。上乾天为健下震雷为动，天下雷行万物不敢妄动。","宜顺其自然不可妄为。初九真诚则吉，六二不图收获，六三飞来横祸，九四守正则安，九五无须强求，上九妄动则灾。"],
[26,"山天大畜","大畜","䷙","艮","乾","大畜：利贞。不家食吉利涉大川。","天在山中，大畜。君子以多识前言往行以畜其德。",["初九：有厉利已。","九二：舆说輹。","九三：良马逐利艰贞。日闲舆卫利有攸往。","六四：童牛之牿元吉。","六五：豮豕之牙吉。","上九：何天之衢亨。"],"大畜卦象征大积蓄大涵养。上艮山为止下乾天为健，天藏山中蓄积刚健。","宜积蓄才德不急于求成。初九止而不进免灾，九二暂缓，九三磨练技艺，六四防患未然，六五以柔制刚，上九四通八达。"],
[27,"山雷颐","颐","䷚","艮","震","颐：贞吉。观颐自求口实。","山下有雷，颐。君子以慎言语节饮食。",["初九：舍尔灵龟观我朵颐凶。","六二：颠颐拂经于丘颐征凶。","六三：拂颐贞凶十年勿用无攸利。","六四：颠颐吉。虎视眈眈其欲逐逐无咎。","六五：拂经居贞吉不可涉大川。","上九：由颐厉吉利涉大川。"],"颐卦象征颐养养生。上艮山为止下震雷为动，山下有雷震动而养。慎言语节饮食。","宜注重颐养之道。初九贪慕他人凶，六二求养不正凶，六三违背养道，六四上下皆养吉，六五安居守正，上九由己养人吉。"],
[28,"泽风大过","大过","䷛","兑","巽","大过：栋桡利有攸往亨。","泽灭木，大过。君子以独立不惧遁世无闷。",["初六：藉用白茅无咎。","九二：枯杨生稊老夫得其女妻无不利。","九三：栋桡凶。","九四：栋隆吉有它吝。","九五：枯杨生华老妇得其士夫无咎无誉。","上六：过涉灭顶凶无咎。"],"大过卦象征大过度非常行动。上兑泽为悦下巽风为入，泽水淹没树木过甚。","宜行非常之事但不可过激。初六谨慎小心，九二枯木逢春，九三过刚则折，九四刚柔相济吉，九五风光不再，上六过甚则凶。"],
[29,"坎为水","坎","䷜","坎","坎","习坎：有孚维心亨行有尚。","水洊至，习坎。君子以常德行习教事。",["初六：习坎入于坎窞凶。","九二：坎有险求小得。","六三：来之坎坎险且枕入于坎窞勿用。","六四：樽酒簋贰用缶纳约自牖终无咎。","九五：坎不盈祗既平无咎。","上六：系用徽纆寘于丛棘三岁不得凶。"],"坎卦象征险陷困难。上下皆坎重险叠陷。需以诚信智慧渡险阻。","面临重重险阻宜小心谨慎。初六入险太深凶，九二险中求小得，六三险上加险勿动，六四简约免祸，九五险未满而平，上六陷险太深凶。"],
[30,"离为火","离","䷝","离","离","离：利贞亨。畜牝牛吉。","明两作，离。大人以继明照于四方。",["初九：履错然敬之无咎。","六二：黄离元吉。","九三：日昃之离不鼓缶而歌则大耋之嗟凶。","九四：突如其来如焚如死如弃如。","六五：出涕沦若戚嗟若吉。","上九：王用出征有嘉折首获匪其丑无咎。"],"离卦象征火光明依附。上下皆火光明相继。重明之象耀四方。","宜发扬光明明辨是非。初九谨慎敬事，六二中正大吉，九三盛极将衰，九四突如其来凶，六五忧惧而吉，上九出征建功。"],
[31,"泽山咸","咸","䷞","兑","艮","咸：亨利贞。取女吉。","山上有泽，咸。君子以虚受人。",["初六：咸其拇。","六二：咸其腓凶居吉。","九三：咸其股执其随往吝。","九四：贞吉悔亡。憧憧往来朋从尔思。","九五：咸其脢无悔。","上六：咸其辅颊舌。"],"咸卦象征感应感通。上兑泽为悦下艮山为止，山泽通气互感。君子以虚受人。","宜以诚相感情事亨通。初六初感其微，六二不动则吉，九三执迷则吝，九四贞定则吉，九五无悔，上六口舌之感。"],
[32,"雷风恒","恒","䷟","震","巽","恒：亨无咎利贞。利有攸往。","雷风，恒。君子以立不易方。",["初六：浚恒贞凶无攸利。","九二：悔亡。","九三：不恒其德或承之羞贞吝。","九四：田无禽。","六五：恒其德贞。妇人吉夫子凶。","上六：振恒凶。"],"恒卦象征恒久持久。上震雷为动下巽风为入，雷风相与恒久不已。","宜持之以恒坚守正道。初六求深则凶，九二悔消，九三不恒则羞，九四久非其位无功，六五恒守则吉，上六振动不恒凶。"],
[33,"天山遁","遁","䷠","乾","艮","遁：亨小利贞。","天下有山，遁。君子以远小人不恶而严。",["初六：遁尾厉勿用有攸往。","六二：执之用黄牛之革莫之胜说。","九三：系遁有疾厉。畜臣妾吉。","九四：好遁君子吉小人否。","九五：嘉遁贞吉。","上九：肥遁无不利。"],"遁卦象征退避隐退。上乾天为健下艮山为止，天下有山遁藏之象。","宜退守隐忍不宜进取。初六退避不及危，六二固守不动，九三恋栈不去病，九四及时退避吉，九五适时应退，上九远走高飞无不利。"],
[34,"雷天大壮","大壮","䷡","震","乾","大壮：利贞。","雷在天上，大壮。君子以非礼弗履。",["初九：壮于趾征凶有孚。","九二：贞吉。","九三：小人用壮君子用罔贞厉。羝羊触藩羸其角。","九四：贞吉悔亡。藩决不羸壮于大舆之輹。","六五：丧羊于易无悔。","上六：羝羊触藩不能退不能遂无攸利。艰则吉。"],"大壮卦象征壮大强盛。上震雷为动下乾天为健，雷行天上气势壮大。","势壮盛但须守正。初九壮趾凶，九二中正吉，九三逞强危，九四刚柔并济吉，六五柔中无悔，上六进退两难艰。非礼弗履。"],
[35,"火地晋","晋","䷢","离","坤","晋：康侯用锡马蕃庶昼日三接。","明出地上，晋。君子以自昭明德。",["初六：晋如摧如贞吉。罔孚裕无咎。","六二：晋如愁如贞吉。受兹介福于其王母。","六三：众允悔亡。","九四：晋如鼫鼠贞厉。","六五：悔亡失得勿恤。往吉无不利。","上九：晋其角维用伐邑厉吉无咎贞吝。"],"晋卦象征前进晋升。上离火为明下坤地为顺，明出地上光明上升。","运势上升宜进取。初六始阻终吉，六二愁中得福，六三众信服无悔，九四贪位危，六五不计得失吉，上九功成思退。自昭明德。"],
[36,"地火明夷","明夷","䷣","坤","离","明夷：利艰贞。","明入地中，明夷。君子以莅众用晦而明。",["初九：明夷于飞垂其翼。君子于行三日不食。有攸往主人有言。","六二：明夷于左股用拯马壮吉。","九三：明夷于南狩得其大首不可疾贞。","六四：入于左腹获明夷之心于出门庭。","六五：箕子之明夷利贞。","上六：不明晦。初登于天后入于地。"],"明夷卦象征光明受伤困境。上坤地为顺下离火为明，明入地中光明受掩。","处困境中宜坚贞守志。初九早避吉，六二受伤得救，九三除害得首，六四脱险而出，六五守正吉，上六黑暗至极。用晦而明。"],
[37,"风火家人","家人","䷤","巽","离","家人：利女贞。","风自火出，家人。君子以言有物而行有恒。",["初九：闲有家悔亡。","六二：无攸遂在中馈贞吉。","九三：家人嗃嗃悔厉吉。妇子嘻嘻终吝。","六四：富家大吉。","九五：王假有家勿恤吉。","上九：有孚威如终吉。"],"家人卦象征家庭家人。上巽风为入下离火为明，风自火出家道之象。","家庭和睦宜持家守正。初九防患未然，六二主内贞吉，九三严家吉，六四富家大吉，九五爱家吉，上九诚信威严吉。"],
[38,"火泽睽","睽","䷥","离","兑","睽：小事吉。","上火下泽，睽。君子以同而异。",["初九：悔亡。丧马勿逐自复。见恶人无咎。","九二：遇主于巷无咎。","六三：见舆曳其牛掣。其人天且劓无初有终。","九四：睽孤遇元夫交孚厉无咎。","六五：悔亡。厥宗噬肤往何咎。","上九：睽孤见豕负涂载鬼一车。先张之弧后说之弧。匪寇婚媾往遇雨则吉。"],"睽卦象征乖离对立。上离火为明下兑泽为悦，火炎上泽润下相乖离。","小事可吉大事不宜。初九不追悔消，九二遇主于巷，六三有初无终，九四交信无咎，六五往何咎，上九疑消则吉。同而异。"],
[39,"水山蹇","蹇","䷦","坎","艮","蹇：利西南不利东北。利见大人贞吉。","山上有水，蹇。君子以反身修德。",["初六：往蹇来誉。","六二：王臣蹇蹇匪躬之故。","九三：往蹇来反。","六四：往蹇来连。","九五：大蹇朋来。","上六：往蹇来硕吉利见大人。"],"蹇卦象征艰难跛足。上坎水为险下艮山为止，山高水险行路艰难。","处艰难中宜反身修德。初六知难而退得誉，六二鞠躬尽瘁，九三往难返喜，六四往难来顺，九五大难得朋，上六来则大吉。"],
[40,"雷水解","解","䷧","震","坎","解：利西南。无所往其来复吉。有攸往夙吉。","雷雨作，解。君子以赦过宥罪。",["初六：无咎。","九二：田获三狐得黄矢贞吉。","六三：负且乘致寇至贞吝。","九四：解而拇朋至斯孚。","六五：君子维有解吉。有孚于小人。","上六：公用射隼于高墉之上获之无不利。"],"解卦象征解除困难解脱。上震雷为动下坎水为险，雷雨交加化解险阻。","困难将解宜速行动。初六刚柔相济无咎，九二田获贞吉，六三小人得势寇至，九四解去小人，六五以德化人吉，上九除害得利。"],
[41,"山泽损","损","䷨","艮","兑","损：有孚元吉无咎可贞。利有攸往。二簋可用享。","山下有泽，损。君子以惩忿窒欲。",["初九：已事遄往无咎酌损之。","九二：利贞征凶。弗损益之。","六三：三人行则损一人。一人行则得其友。","六四：损其疾使遄有喜无咎。","六五：或益之十朋之龟弗克违元吉。","上九：弗损益之无咎贞吉。利有攸往得臣无家。"],"损卦象征减损损失。上艮山为止下兑泽为悦，山下有泽损泽益山。","有所损失但终有增益。初九损己利人，九二守正损中受益，六三损一得一，六四去病则喜，六五受上益大吉，上九损极受益。惩忿窒欲。"],
[42,"风雷益","益","䷩","巽","震","益：利有攸往利涉大川。","风雷，益。君子以见善则迁有过则改。",["初九：利用为大作元吉无咎。","六二：或益之十朋之龟弗克违永贞吉。王用享于帝吉。","六三：益之用凶事无咎。有孚中行告公用圭。","六四：中行告公从利用为依迁国。","九五：有孚惠心勿问元吉。有孚惠我德。","上九：莫益之或击之立心勿恒凶。"],"益卦象征增益利益。上巽风为入下震雷为动，风雷激荡互相增益。","大有增益利进取。初九大作元吉，六二受上益永贞吉，六三用凶事无咎，六四迁国为依，九五有孚惠心元吉，上九贪得无厌凶。见善则迁有过则改。"],
[43,"泽天夬","夬","䷪","兑","乾","夬：扬于王庭孚号有厉。告自邑不利即戎。利有攸往。","泽上于天，夬。君子以施禄及下居德则忌。",["初九：壮于前趾往不胜为咎。","九二：惕号莫夜有戎勿恤。","九三：壮于頄有凶。君子夬夬独行遇雨若濡有愠无咎。","九四：臀无肤其行次且。牵羊悔亡闻言不信。","九五：苋陆夬夬中行无咎。","上六：无号终有凶。"],"夬卦象征决断决裂。上兑泽为悦下乾天为健，泽水满溢而上于天。","宜果断行事但不可冲动。初九往不胜咎，九二有备无患，九三独行遇雨无咎，九四犹豫不决，九五中行无咎，上六无号凶。"],
[44,"天风姤","姤","䷫","乾","巽","姤：女壮勿用取女。","天下有风，姤。后以施命诰四方。",["初六：系于金柅贞吉。有攸往见凶。羸豕孚蹢躅。","九二：包有鱼无咎不利宾。","九三：臀无肤其行次且厉无大咎。","九四：包无鱼起凶。","九五：以杞包瓜含章有陨自天。","上九：姤其角吝无咎。"],"姤卦象征相遇邂逅。上乾天为健下巽风为入，风行天下万物相遇。","宜谨慎对待相遇之事。初六系止则吉往则凶，九二包容吉，九三虽危无大咎，九四无容凶，九五含章有陨自天，上九穷而遇吝。"],
[45,"泽地萃","萃","䷬","兑","坤","萃：亨。王假有庙。利见大人亨利贞。用大牲吉利有攸往。","泽上于地，萃。君子以除戎器戒不虞。",["初六：有孚不终乃乱乃萃。若号一握为笑勿恤往无咎。","六二：引吉无咎。孚乃利用禴。","六三：萃如嗟如无攸利。往无咎小吝。","九四：大吉无咎。","九五：萃有位无咎。匪孚元永贞悔亡。","上六：赍咨涕洟无咎。"],"萃卦象征聚集荟萃。上兑泽为悦下坤地为顺，泽聚于地荟萃之象。","宜聚集力量团结人心。初六诚信不终则乱，六二引荐吉，六三嗟叹无利，九四大吉，九五有位无咎，上六悲伤无咎。戒不虞。"],
[46,"地风升","升","䷭","坤","巽","升：元亨。用见大人勿恤。南征吉。","地中生木，升。君子以顺德积小以高大。",["初六：允升大吉。","九二：孚乃利用禴无咎。","九三：升虚邑。","六四：王用亨于岐山吉无咎。","六五：贞吉升阶。","上六：冥升利于不息之贞。"],"升卦象征上升晋升。上坤地为顺下巽风为入，地中生木循序渐进。","运势上升事业进步。初六诚信大吉，九二虔诚无咎，九三升虚邑，六四亨通岐山，六五升阶得志，上六冥升不息。积小以高大。"],
[47,"泽水困","困","䷮","兑","坎","困：亨贞大人吉无咎。有言不信。","泽无水，困。君子以致命遂志。",["初六：臀困于株木入于幽谷三岁不觌。","九二：困于酒食朱绂方来。利用享祀征凶无咎。","六三：困于石据于蒺藜。入于其宫不见其妻凶。","九四：来徐徐困于金车吝有终。","九五：劓刖困于赤绂。乃徐有说利用祭祀。","上六：困于葛藟于臲卼。曰动悔有悔征吉。"],"困卦象征困穷困境。上兑泽为悦下坎水为险，泽中无水困穷之象。","处困穷中宜守正待时。初六入幽谷三岁不遇，九二困中得福，六三困于石凶，九四徐徐有终，九五渐脱困境，上六动悔征吉。致命遂志。"],
[48,"水风井","井","䷯","坎","巽","井：改邑不改井无丧无得。往来井井汔至亦未繘井羸其瓶凶。","木上有水，井。君子以劳民劝相。",["初六：井泥不食旧井无禽。","九二：井谷射鲋瓮敝漏。","九三：井渫不食为我心恻。可用汲王明并受其福。","六四：井甃无咎。","九五：井洌寒泉食。","上六：井收勿幕有孚元吉。"],"井卦象征水井养育。上坎水为险下巽风为入，木上有水井养之象。","宜修德养才厚积薄发。初六旧井不修废，九二井漏不适用，九三井清待汲，六四修井无咎，九五寒泉可食，上六井收大成。"],
[49,"泽火革","革","䷰","兑","离","革：己日乃孚。元亨利贞悔亡。","泽中有火，革。君子以治历明时。",["初九：巩用黄牛之革。","六二：己日乃革之征吉无咎。","九三：征凶贞厉。革言三就有孚。","九四：悔亡有孚改命吉。","九五：大人虎变未占有孚。","上六：君子豹变小人革面。征凶居贞吉。"],"革卦象征变革改革。上兑泽为悦下离火为明，泽中有火变革之象。","宜变革图新。初九巩固基础，六二适时改革吉，九三变革艰难可信，九四改命吉，九五虎变文炳，上六豹变文蔚。治历明时。"],
[50,"火风鼎","鼎","䷱","离","巽","鼎：元吉亨。","木上有火，鼎。君子以正位凝命。",["初六：鼎颠趾利出否。得妾以其子无咎。","九二：鼎有实我仇有疾不我能即吉。","九三：鼎耳革其行塞雉膏不食。方雨亏悔终吉。","九四：鼎折足覆公餗其形渥凶。","六五：鼎黄耳金铉利贞。","上九：鼎玉铉大吉无不利。"],"鼎卦象征鼎器鼎革。上离火为明下巽风为入，木上有火鼎烹之象。","宜建立制度革故鼎新。初六倾倒除垢，九二鼎实谨慎，九三鼎耳修改终吉，九四鼎折足凶，六五黄耳金铉利贞，上九玉铉大吉。正位凝命。"],
[51,"震为雷","震","䷲","震","震","震：亨。震来虩虩笑言哑哑。震惊百里不丧匕鬯。","洊雷，震。君子以恐惧修省。",["初九：震来虩虩后笑言哑哑吉。","六二：震来厉亿丧贝。跻于九陵勿逐七日得。","六三：震苏苏震行无眚。","九四：震遂泥。","六五：震往来厉亿无丧有事。","上六：震索索视矍矍征凶。震不于其躬于其邻无咎。婚媾有言。"],"震卦象征震动惊雷。上下皆震重雷交作震惊百里。","宜保持警惕修身反省。初九恐惧修省吉，六二中正无畏得，六三震动无灾，九四震而陷泥，六五往来有厉无失，上六惊惧则凶。"],
[52,"艮为山","艮","䷳","艮","艮","艮：艮其背不获其身。行其庭不见其人无咎。","兼山，艮。君子以思不出其位。",["初六：艮其趾无咎利永贞。","六二：艮其腓不拯其随其心不快。","九三：艮其限列其夤厉薰心。","六四：艮其身无咎。","六五：艮其辅言有序悔亡。","上九：敦艮吉。"],"艮卦象征停止静止。上下皆山重山叠嶂止而不动。知止而后有定。","宜静不宜动。初六止趾无咎，六二止腓不快，九三止腰危心，六四止身无咎，六五止口有序，上九敦厚吉。思不出其位。"],
[53,"风山渐","渐","䷴","巽","艮","渐：女归吉利贞。","山上有木，渐。君子以居贤德善俗。",["初六：鸿渐于干小子厉有言无咎。","六二：鸿渐于磐饮食衎衎吉。","九三：鸿渐于陆夫征不复妇孕不育凶。利御寇。","六四：鸿渐于木或得其桷无咎。","九五：鸿渐于陵妇三岁不孕终莫之胜吉。","上九：鸿渐于逵其羽可用为仪吉。"],"渐卦象征渐进循序渐进。上巽风为入下艮山为止，山上有木逐渐生长。","宜渐进不可冒进。初六鸿渐于干，六二渐于磐吉，九三渐于陆凶，六四渐于木无咎，九五渐于陵吉，上九渐于逵吉。居贤德善俗。"],
[54,"雷泽归妹","归妹","䷵","震","兑","归妹：征凶无攸利。","泽上有雷，归妹。君子以永终知敝。",["初九：归妹以娣跛能履征吉。","九二：眇能视利幽人之贞。","六三：归妹以须反归以娣。","九四：归妹愆期迟归有时。","六五：帝乙归妹其君之袂不如其娣之袂良。月几望吉。","上六：女承筐无实士刲羊无血无攸利。"],"归妹卦象征少女出嫁归宿。上震雷为动下兑泽为悦，泽上有雷婚嫁之象。","婚姻之事宜谨慎。初九跛能履征吉，九二眇能视贞吉，六三反归以娣，九四愆期有时，六五帝乙归妹吉，上六承虚筐无利。永终知敝。"],
[55,"雷火丰","丰","䷶","震","离","丰：亨。王假之勿忧宜日中。","雷电皆至，丰。君子以折狱致刑。",["初九：遇其配主虽旬无咎往有尚。","六二：丰其蔀日中见斗。往得疑疾有孚发若吉。","九三：丰其沛日中见沬。折其右肱无咎。","九四：丰其蔀日中见斗。遇其夷主吉。","六五：来章有庆誉吉。","上六：丰其屋蔀其家窥其户阒其无人三岁不觌凶。"],"丰卦象征丰盛丰大。上震雷为动下离火为明，雷电皆至气势丰盛。","运势旺盛但宜持中。初九遇配主往有尚，六二有孚发若吉，九三折肱无咎，九四遇夷主吉，六五来章有庆，上六丰极凶。折狱致刑。"],
[56,"火山旅","旅","䷷","离","艮","旅：小亨。旅贞吉。","山上有火，旅。君子以明慎用刑而不留狱。",["初六：旅琐琐斯其所取灾。","六二：旅即次怀其资得童仆贞。","九三：旅焚其次丧其童仆贞厉。","九四：旅于处得其资斧我心不快。","六五：射雉一矢亡终以誉命。","上九：鸟焚其巢旅人先笑后号咷。丧牛于易凶。"],"旅卦象征旅行客居。上离火为明下艮山为止，山上有火旅人夜行。","宜谨慎行事不可张扬。初六琐琐取灾，六二得资得仆，九三焚次伤仆，九四得斧不快，六五射雉得誉，上九先笑后哭凶。"],
[57,"巽为风","巽","䷸","巽","巽","巽：小亨。利有攸往利见大人。","随风，巽。君子以申命行事。",["初六：进退利武人之贞。","九二：巽在床下用史巫纷若吉无咎。","九三：频巽吝。","六四：悔亡田获三品。","九五：贞吉悔亡无不利。无初有终。先庚三日后庚三日吉。","上九：巽在床下丧其资斧贞凶。"],"巽卦象征顺从谦逊。上下皆风行风草偃柔顺入微。","宜谦逊顺从以柔克刚。初六进退不决，九二巽顺得中吉，九三频巽吝，六四田获有功，九五中正无不利，上九谦卑过度凶。"],
[58,"兑为泽","兑","䷹","兑","兑","兑：亨利贞。","丽泽，兑。君子以朋友讲习。",["初九：和兑吉。","九二：孚兑吉悔亡。","六三：来兑凶。","九四：商兑未宁介疾有喜。","九五：孚于剥有厉。","上六：引兑。"],"兑卦象征喜悦言说。上下皆泽两泽相连悦乐之象。","宜以和悦待人。初九和兑吉，九二诚信吉，六三来悦取媚凶，九四商兑有喜，九五信小人危，上六引诱凶。朋友讲习。"],
[59,"风水涣","涣","䷺","巽","坎","涣：亨。王假有庙。利涉大川利贞。","风行水上，涣。先王以享于帝立庙。",["初六：用拯马壮吉。","九二：涣奔其机悔亡。","六三：涣其躬无悔。","六四：涣其群元吉。涣有丘匪夷所思。","九五：涣汗其大号涣王居无咎。","上九：涣其血去逖出无咎。"],"涣卦象征涣散离散。上巽风为入下坎水为险，风行水上涣散之象。","宜聚合人心挽救涣散。初六用拯马壮吉，九二涣奔机悔亡，六三涣其躬无悔，六四涣其群元吉，九五涣王居无咎，上九涣血去害。"],
[60,"水泽节","节","䷻","坎","兑","节：亨。苦节不可贞。","泽上有水，节。君子以制数度议德行。",["初九：不出户庭无咎。","九二：不出门庭凶。","六三：不节若则嗟若无咎。","六四：安节亨。","九五：甘节吉往有尚。","上六：苦节贞凶悔亡。"],"节卦象征节制节度。上坎水为险下兑泽为悦，泽上有水需有节制。","宜适当节制。初九不出户庭知时，九二不出门庭失时凶，六三不节则嗟，六四安节亨，九五甘节吉，上六苦节太过凶。制数度议德行。"],
[61,"风泽中孚","中孚","䷼","巽","兑","中孚：豚鱼吉。利涉大川利贞。","泽上有风，中孚。君子以议狱缓死。",["初九：虞吉有它不燕。","九二：鸣鹤在阴其子和之。我有好爵吾与尔靡之。","六三：得敌或鼓或罢或泣或歌。","六四：月几望马匹亡无咎。","九五：有孚挛如无咎。","上九：翰音登于天贞凶。"],"中孚卦象征内心诚信。上巽风为入下兑泽为悦，风行泽上诚信感化。","宜以诚待人。初九虞吉有它不燕，九二鸣鹤子和，六三得敌鼓罢，六四月几望无咎，九五有孚挛如无咎，上九翰音登天凶。议狱缓死。"],
[62,"雷山小过","小过","䷽","震","艮","小过：亨利贞。可小事不可大事。飞鸟遗之音不宜上宜下大吉。","山上有雷，小过。君子以行过乎恭丧过乎哀用过乎俭。",["初六：飞鸟以凶。","六二：过其祖遇其妣。不及其君遇其臣无咎。","九三：弗过防之从或戕之凶。","九四：无咎弗过遇之。往厉必戒勿用永贞。","六五：密云不雨自我西郊。公弋取彼在穴。","上六：弗遇过之飞鸟离之凶。是谓灾眚。"],"小过卦象征小有超过小过失。上震雷为动下艮山为止，雷在山上稍有过越。","宜小事不宜大事宜下不宜上。初六飞鸟凶，六二过祖遇妣无咎，九三弗过防之凶，九四弗过遇之厉，六五密云不雨，上六飞鸟离之凶。"],
[63,"水火既济","既济","䷾","坎","离","既济：亨小利贞。初吉终乱。","水在火上，既济。君子以思患而预防之。",["初九：曳其轮濡其尾无咎。","六二：妇丧其茀勿逐七日得。","九三：高宗伐鬼方三年克之小人勿用。","六四：繻有衣袽终日戒。","九五：东邻杀牛不如西邻之禴祭实受其福。","上六：濡其首厉。"],"既济卦象征已经成功完成。上坎水为险下离火为明，水在火上功成之象。","功成名就但须防盛极而衰。初九曳轮濡尾无咎，六二丧茀勿逐得，九三三年克之小人勿用，六四终日戒慎，九五实受其福，上六濡首危。思患预防。"],

    }
    if(!st.e){
      aiResult.innerHTML="<p style=color:#a89880;font-size:12px>请先掷铜钱起卦</p>";
      return;
    }
    var e=st.e, cx=st.cx;
    var p = "本卦："+e[1]+"。上卦："+e[4]+"，下卦："+e[5]+"。卦辞："+e[6]+"。象传："+e[7]+"。解读："+e[9]+"。运势："+e[10]+"。";
    if(lc&&lc.some(function(x){return x;})){
      p += "动爻：";
      for(var i=0;i<6;i++) if(lc[i]) p += ["初","二","三","四","五","上"][i]+(st.res[i].v?"九":"六")+"爻："+e[8][i]+"。";
      if(cx) p += "变卦："+cx[1]+"。上卦："+cx[4]+"，下卦："+cx[5]+"。卦辞："+cx[6]+"。解读："+cx[9]+"。运势："+cx[10]+"。";
    }
    if(PAN.lines){
      var p2 = "\n\n===== 六爻排盘 =====\n";
      p2 += "年月日时: "+CN.gan[PAN.yearGz.ganS]+CN.zhi[PAN.yearGz.zhiS]+"年 "+CN.zhi[PAN.monthZhiS]+"月 "+CN.gan[PAN.dayGz.ganS]+CN.zhi[PAN.dayGz.zhiS]+"日 "+CN.gan[PAN.hourGz.ganS]+CN.zhi[PAN.hourGz.zhiS]+"时\n";
      p2 += "空亡: "+PAN.kongWang.map(function(x){var zc="子丑寅卯辰巳午未申酉戌亥";return CN.zhi[zc[x]]||zc[x];}).join(" ")+"\n";
      p2 += "宫: "+CN.gong[PAN.gong]+CN.wx[PAN.gongWx]+"\n";
      p2 += "卦: "+e[1]+"\n";
      for(var i=5;i>=0;i--){
        var l=PAN.lines[i];
        p2 += CN.ls[i]+" "+["初","二","三","四","五","上"][i]+"爻 "+CN.zhi[l.zhi]+" "+CN.wx[l.wx]+" "+CN.lq[l.liuqin]+(l.shi?" 世":"")+(l.ying?" 应":"")+(l.dong?" 动":"")+(l.kong?"(空)":"")+"\n";
      }
      if(cx&&cx[0]!==(e?e[0]:0)) p2 += "变卦: "+cx[1]+"\n";
      p += p2;
    }
    var q = document.getElementById("divQuestion").value.trim();
    if(q) p = "问题："+q+"\n\n"+p;
    callAI(key, p, aiResult);
  }catch(err){
    document.getElementById("aiResult").innerHTML="<p style=color:#c0392b;font-size:12px>JS错误:"+err.message+"</p>";
  }
};

</script>
</body>
</html>
